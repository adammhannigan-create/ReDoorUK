<style>
  :root {
    --bg: #F5F6F4;
    --surface: #FFFFFF;
    --ink: #14181F;
    --ink-soft: #515B69;
    --line: #E3E3E0;
    --line-strong: #CCCEC9;
    --accent: #1F3A5F;
    --accent-deep: #152A47;
    --on-accent: #FFFFFF;
    --stamp: #14181F;
    --avail: #25D366;
    --avail-ink: #06331A;

    --font-display: "Space Grotesk", system-ui, sans-serif;
    --font-body: "Inter", system-ui, sans-serif;
    --font-mono: "Space Mono", ui-monospace, monospace;

    --maxw: 1180px;
    --radius: 10px;

    --z-header: 100;

    --ease: cubic-bezier(0.22, 1, 0.36, 1);
  }

  * { box-sizing: border-box; }

  html { -webkit-text-size-adjust: 100%; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-body);
    font-size: 16px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  a { color: inherit; }

  .wrap { width: 100%; max-width: var(--maxw); margin: 0 auto; padding: 0 40px; }

  /* ---------- Header ---------- */
  header.site {
    position: sticky;
    top: 0;
    z-index: var(--z-header);
    background: color-mix(in srgb, var(--accent) 7%, #ffffff);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid color-mix(in srgb, var(--accent) 14%, var(--line));
  }
  .site-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    padding: 13px 40px;
    max-width: var(--maxw);
    margin: 0 auto;
  }
  .brand {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 1.35rem;
    letter-spacing: -0.03em;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 0;
    flex: 0 0 auto;
  }
  .brand .re { color: var(--accent); font-style: italic; margin-right: 0.04em; }

  .site-nav {
    display: flex;
    gap: 26px;
    margin: 0 auto;
    font-family: var(--font-mono);
    font-size: 0.82rem;
  }
  .site-nav a {
    text-decoration: none;
    color: var(--ink-soft);
    position: relative;
    padding: 4px 0;
    transition: color .18s var(--ease);
  }
  .site-nav a::after {
    content: "";
    position: absolute;
    left: 0; right: 0; bottom: -1px;
    height: 1.5px;
    background: var(--accent);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform .2s var(--ease);
  }
  .site-nav a:hover { color: var(--ink); }
  .site-nav a:hover::after { transform: scaleX(1); }

  .phone-cta {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    flex: 0 0 auto;
    font-family: var(--font-mono);
    font-weight: 700;
    font-size: 0.82rem;
    color: var(--on-accent);
    background: var(--accent);
    border: 1px solid var(--accent);
    padding: 8px 15px;
    border-radius: 999px;
    text-decoration: none;
    white-space: nowrap;
    transition: background .18s var(--ease), transform .12s var(--ease);
  }
  .phone-cta:hover { background: var(--accent-deep); }
  .phone-cta:active { transform: translateY(1px); }
  .phone-cta svg { width: 15px; height: 15px; flex: 0 0 auto; }

  /* ---------- Hero ---------- */
  .hero { padding: clamp(44px, 7vw, 88px) 0 clamp(32px, 5vw, 56px); }
  .hero-grid {
    display: grid;
    grid-template-columns: 1.1fr 0.9fr;
    gap: clamp(32px, 5vw, 68px);
    align-items: center;
  }
  .hero-feature {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 20px 45px -30px rgba(27,26,23,0.5);
  }
  .hf-photo { position: relative; aspect-ratio: 4 / 3; background: #DEE1E4; overflow: hidden; }
  .hf-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .hf-tag {
    position: absolute; top: 14px; left: 14px;
    font-family: var(--font-mono); font-weight: 700; font-size: 0.68rem;
    letter-spacing: 0.14em; padding: 5px 10px 4px;
    color: var(--avail-ink); background: var(--avail); border-radius: 4px;
  }
  .hf-body { padding: 18px 20px 20px; }
  .hf-head { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; }
  .hf-title { font-family: var(--font-display); font-weight: 500; font-size: 1.15rem; letter-spacing: -0.02em; margin: 0; line-height: 1.2; }
  .hf-price { font-family: var(--font-mono); font-weight: 700; font-size: 1.15rem; white-space: nowrap; }
  .hf-spec { font-family: var(--font-mono); font-size: 0.76rem; color: var(--ink-soft); margin: 10px 0 16px; line-height: 1.5; }
  .hf-cta {
    display: inline-flex; align-items: center; gap: 7px;
    font-family: var(--font-display); font-weight: 500; font-size: 0.88rem;
    color: var(--accent-deep); text-decoration: none;
  }
  .hf-cta:hover { color: var(--accent); }
  .hf-cta span.arr { transition: transform .18s var(--ease); }
  .hf-cta:hover span.arr { transform: translateX(3px); }

  @media (max-width: 860px) {
    .hero-grid { grid-template-columns: 1fr; gap: 34px; }
    .hero-feature { max-width: 440px; }
  }

  .hero h1 {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: clamp(2.6rem, 7vw, 4.6rem);
    line-height: 1.02;
    letter-spacing: -0.035em;
    margin: 0 0 20px;
    max-width: 15ch;
    text-wrap: balance;
  }
  .hero h1 .accent { color: var(--accent); }
  .hero .lede {
    font-size: clamp(1.02rem, 1.6vw, 1.2rem);
    color: var(--ink-soft);
    max-width: 60ch;
    margin: 0;
    text-wrap: pretty;
  }
  .hero .meta {
    margin-top: 28px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px 28px;
    font-family: var(--font-mono);
    font-size: 0.8rem;
    color: var(--ink-soft);
    align-items: center;
  }
  .hero .meta b { color: var(--ink); font-weight: 700; }
  .hero .meta .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--avail); display: inline-block; margin-right: 7px; vertical-align: middle; }

  /* ---------- Controls ---------- */
  .controls {
    position: static;
    background: var(--bg);
    padding: 14px 0;
    border-bottom: 1px solid var(--line);
    margin-bottom: 36px;
  }
  .controls-inner { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .filter {
    font-family: var(--font-mono);
    font-size: 0.78rem;
    letter-spacing: 0.01em;
    padding: 7px 14px;
    border: 1px solid var(--line-strong);
    background: transparent;
    color: var(--ink-soft);
    border-radius: 999px;
    cursor: pointer;
    transition: color .18s var(--ease), background .18s var(--ease), border-color .18s var(--ease);
  }
  .filter:hover { color: var(--ink); border-color: var(--ink); }
  .filter[aria-pressed="true"] {
    background: var(--ink);
    color: var(--bg);
    border-color: var(--ink);
  }
  .filter .n { opacity: 0.6; }

  .type-filters { display: flex; gap: 8px; flex-wrap: wrap; }
  .controls-right { display: flex; gap: 12px; align-items: center; margin-left: auto; }
  .unit-switch {
    display: inline-flex;
    border: 2px solid #1A1A1A;
    border-radius: 999px;
    overflow: hidden;
    background: #F5C518;
    box-shadow: inset 0 -3px 0 rgba(0,0,0,0.12);
  }
  .unit-switch button {
    font-family: var(--font-mono);
    font-weight: 700;
    font-size: 0.7rem;
    letter-spacing: 0.03em;
    padding: 6px 12px 10px;
    background: transparent;
    border: none;
    border-right: 1px solid rgba(26,26,26,0.35);
    color: #1A1A1A;
    cursor: pointer;
    position: relative;
    transition: background .16s var(--ease), color .16s var(--ease);
  }
  .unit-switch button:last-child { border-right: none; }
  .unit-switch button::after {
    content: "";
    position: absolute;
    left: 2px; right: 2px; bottom: 3px;
    height: 4px;
    background-image: repeating-linear-gradient(90deg, #1A1A1A 0 1.5px, transparent 1.5px 6px);
    pointer-events: none;
  }
  .unit-switch button:hover { background: rgba(26,26,26,0.08); }
  .unit-switch button[aria-pressed="true"] { background: #1A1A1A; color: #F5C518; }
  .unit-switch button[aria-pressed="true"]::after {
    background-image: repeating-linear-gradient(90deg, #F5C518 0 1.5px, transparent 1.5px 6px);
  }
  .status-select { position: relative; }
  .status-select select {
    font-family: var(--font-mono);
    font-size: 0.76rem;
    padding: 7px 30px 7px 14px;
    border: 1px solid var(--line-strong);
    border-radius: 999px;
    background: var(--surface);
    color: var(--ink);
    cursor: pointer;
    -webkit-appearance: none;
    appearance: none;
  }
  .status-select select:hover { border-color: var(--ink); }
  .status-select::after {
    content: "";
    position: absolute; right: 13px; top: 50%;
    width: 6px; height: 6px;
    border-right: 1.5px solid var(--ink-soft);
    border-bottom: 1.5px solid var(--ink-soft);
    transform: translateY(-70%) rotate(45deg);
    pointer-events: none;
  }

  /* ---------- Grid ---------- */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 28px;
    padding-bottom: 80px;
  }

  .door {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: transform .28s var(--ease), box-shadow .28s var(--ease), border-color .28s var(--ease);
    opacity: 0;
    transform: translateY(14px);
  }
  .door.in { opacity: 1; transform: none; }
  .door:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 30px -18px rgba(27,26,23,0.45);
    border-color: var(--line-strong);
  }
  .door.sold { opacity: 0.94; }

  /* photo / placeholder */
  .photo {
    position: relative;
    aspect-ratio: 4 / 3;
    background: #DEE1E4;
    overflow: hidden;
  }
  .photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .photo .ph {
    width: 100%; height: 100%;
    display: grid; place-items: center;
    background:
      linear-gradient(#E8EAED, #D6DADE);
  }
  .photo .ph svg { width: 58%; height: auto; opacity: 0.5; }

  /* photo carousel (multi-image) */
  .carousel { position: absolute; inset: 0; overflow: hidden; }
  .car-track { display: flex; height: 100%; transition: transform .4s var(--ease); }
  .car-track img { min-width: 100%; width: 100%; height: 100%; object-fit: cover; display: block; }
  .car-btn {
    position: absolute; top: 50%; transform: translateY(-50%);
    width: 34px; height: 34px; border-radius: 50%;
    border: none; cursor: pointer;
    background: color-mix(in srgb, var(--surface) 82%, transparent);
    color: var(--ink);
    display: grid; place-items: center;
    backdrop-filter: blur(4px);
    box-shadow: 0 2px 8px -2px rgba(0,0,0,0.3);
    transition: background .16s var(--ease), opacity .16s var(--ease);
    opacity: 0; z-index: 2;
  }
  .photo:hover .car-btn, .car-btn:focus-visible { opacity: 1; }
  .car-btn:hover { background: var(--surface); }
  .car-btn.prev { left: 10px; }
  .car-btn.next { right: 10px; }
  .car-btn svg { width: 16px; height: 16px; }
  .car-dots {
    position: absolute; bottom: 10px; left: 0; right: 0;
    display: flex; justify-content: center; gap: 6px; z-index: 2;
  }
  .car-dots button {
    width: 7px; height: 7px; border-radius: 50%; padding: 0;
    border: none; cursor: pointer;
    background: color-mix(in srgb, var(--surface) 60%, transparent);
    box-shadow: 0 0 0 1px rgba(0,0,0,0.15);
    transition: background .16s var(--ease);
  }
  .car-dots button[aria-current="true"] { background: var(--surface); }
  @media (hover: none) { .car-btn { opacity: 1; } }

  /* grade badge — colour-coded circle in the corner of each listing */
  .grade-badge {
    position: absolute;
    top: 12px; right: 12px;
    width: 42px; height: 42px;
    border-radius: 50%;
    display: grid; place-items: center;
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 0.98rem;
    letter-spacing: -0.02em;
    color: #0E1A0E;
    border: 2px solid rgba(255,255,255,0.9);
    box-shadow: 0 2px 8px -2px rgba(0,0,0,0.35);
    z-index: 3;
  }
  .grade-badge.g-aplus { background: #2FBF3F; }
  .grade-badge.g-a { background: #7FD65B; }
  .grade-badge.g-b { background: #C8DE4E; }
  .grade-badge.g-c { background: #F2CE2E; }
  .grade-badge.g-d { background: #F0912E; color: #2A1400; }
  .grade-badge .plus { font-size: 0.7em; }

  .stamp {
    position: absolute;
    top: 14px; left: 14px;
    font-family: var(--font-mono);
    font-weight: 700;
    font-size: 0.72rem;
    letter-spacing: 0.14em;
    padding: 5px 10px 4px;
    color: var(--avail-ink);
    background: var(--avail);
    border-radius: 4px;
  }
  .stamp.sold {
    color: var(--bg);
    background: var(--stamp);
    transform: rotate(-4deg);
    border: 2px solid var(--bg);
    box-shadow: 0 0 0 1px var(--stamp);
    font-size: 0.82rem;
    letter-spacing: 0.2em;
    padding: 6px 12px 5px;
  }

  .door-body { padding: 20px 20px 22px; display: flex; flex-direction: column; gap: 16px; flex: 1; }

  .door-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 14px; }
  .door-title {
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 1.18rem;
    letter-spacing: -0.02em;
    line-height: 1.2;
    margin: 0;
    text-wrap: balance;
  }
  .price {
    font-family: var(--font-mono);
    font-weight: 700;
    font-size: 1.15rem;
    white-space: nowrap;
    color: var(--ink);
  }
  .price .note { font-size: 0.66rem; font-weight: 400; color: var(--ink-soft); display: block; text-align: right; letter-spacing: 0.04em; margin-top: 1px; }

  .desc { font-size: 0.92rem; color: var(--ink-soft); margin: 0; text-wrap: pretty; }

  /* spec plate — the signature element */
  .plate {
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #F1F3F5;
    overflow: hidden;
  }
  .plate .row {
    display: grid;
    grid-template-columns: 96px 1fr;
    gap: 12px;
    padding: 8px 12px;
    font-family: var(--font-mono);
    font-size: 0.78rem;
    line-height: 1.35;
    border-top: 1px solid var(--line);
  }
  .plate .row:first-child { border-top: none; }
  .plate .k { color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.06em; font-size: 0.68rem; padding-top: 2px; }
  .plate .v { color: var(--ink); }
  .plate .v .adj { color: var(--accent-deep); }

  .colours { display: flex; flex-wrap: wrap; gap: 6px; }
  .colours .chip {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    padding: 4px 9px;
    border: 1px solid var(--line-strong);
    border-radius: 999px;
    color: var(--ink-soft);
  }

  .door-foot { margin-top: auto; display: flex; gap: 8px; }
  .ask {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    flex: 1;
    justify-content: center;
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 0.9rem;
    padding: 11px 14px;
    border-radius: 8px;
    text-decoration: none;
    background: var(--accent);
    color: var(--on-accent);
    border: 1px solid var(--accent);
    transition: background .18s var(--ease), transform .12s var(--ease), border-color .18s var(--ease);
  }
  .ask:hover { background: var(--accent-deep); }
  .ask:active { transform: translateY(1px); }
  .ask svg { width: 16px; height: 16px; flex: 0 0 auto; }
  .ask.wa { background: var(--avail); color: var(--avail-ink); border-color: var(--avail); }
  .ask.wa:hover { background: #1FB457; }
  .ask.email {
    background: transparent;
    color: var(--accent);
    border-color: var(--line-strong);
  }
  .ask.email:hover { background: transparent; border-color: var(--accent); color: var(--accent-deep); }
  .ask.disabled {
    background: transparent;
    color: var(--ink-soft);
    border-color: var(--line-strong);
    pointer-events: none;
  }

  /* floating WhatsApp button */
  .wa-fab {
    position: fixed;
    right: 20px; bottom: 20px;
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--avail);
    color: #fff;
    display: grid; place-items: center;
    box-shadow: 0 8px 24px -6px rgba(0,0,0,0.4);
    z-index: 90;
    transition: transform .18s var(--ease), box-shadow .18s var(--ease);
  }
  .wa-fab:hover { transform: translateY(-2px) scale(1.04); box-shadow: 0 12px 28px -8px rgba(0,0,0,0.45); }
  .wa-fab svg { width: 30px; height: 30px; }
  @media (prefers-reduced-motion: reduce) { .wa-fab { transition: none; } .wa-fab:hover { transform: none; } }
  @media (max-width: 560px) { .wa-fab { width: 52px; height: 52px; right: 16px; bottom: 16px; } .wa-fab svg { width: 27px; height: 27px; } }

  /* empty state */
  .empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 64px 20px;
    color: var(--ink-soft);
    font-family: var(--font-mono);
    font-size: 0.9rem;
  }

  /* ---------- Hero rating pill ---------- */
  .rating-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 5px 12px 5px 10px;
    border: 1px solid var(--line-strong);
    border-radius: 999px;
    background: var(--surface);
    text-decoration: none;
    color: var(--ink);
  }
  .rating-pill:hover { border-color: var(--ink); }
  .rating-pill .stars { color: #E0A100; letter-spacing: 1px; font-size: 0.82rem; }
  .rating-pill b { font-weight: 700; }
  .rating-pill .lbl { color: var(--ink-soft); font-size: 0.72rem; }

  /* ---------- Reviews / trust section ---------- */
  .reviews {
    padding: clamp(36px, 5vw, 60px) clamp(24px, 4vw, 48px);
    margin: 12px auto;
    background: color-mix(in srgb, var(--accent) 7%, #ffffff);
    border: 1px solid color-mix(in srgb, var(--accent) 12%, var(--line));
    border-radius: 20px;
  }
  .reviews-top {
    display: grid;
    grid-template-columns: minmax(220px, 300px) 1fr;
    gap: clamp(24px, 4vw, 56px);
    align-items: center;
    margin-bottom: 34px;
  }
  .rep-badge {

  .rep-badge .count { font-family: var(--font-mono); font-size: 0.78rem; color: var(--ink-soft); }
  .rep-badge .biz { font-family: var(--font-mono); font-size: 0.72rem; color: var(--ink-soft); margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--line); }
  .reviews-lead h2 {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: clamp(1.5rem, 2.8vw, 2.1rem);

    line-height: 1.1;
    margin: 0 0 12px;

  }
  .reviews-lead p { margin: 0 0 16px; color: var(--ink-soft); max-width: 56ch; text-wrap: pretty; }
  .standouts { display: flex; flex-wrap: wrap; gap: 8px; }
  .standouts .chip {
    font-family: var(--font-mono);
    font-size: 0.72rem;
    padding: 5px 11px;
    border: 1px solid var(--line-strong);
    border-radius: 999px;
    color: var(--ink);
    background: var(--surface);
  }
  .quote-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 18px;
  }
  .review-card {
    border: 1px solid var(--line);
    border-radius: 10px;
    background: var(--surface);
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .review-card .rc-stars { color: #E0A100; font-size: 0.86rem; letter-spacing: 1.5px; }
  .review-card blockquote { margin: 0; font-size: 0.94rem; line-height: 1.5; color: var(--ink); text-wrap: pretty; }
  .review-card .rc-name { font-family: var(--font-mono); font-size: 0.76rem; color: var(--ink-soft); margin-top: auto; }
  .reviews-more { margin-top: 22px; }
  .reviews-more a {
    font-family: var(--font-mono);
    font-size: 0.8rem;
    color: var(--accent-deep);
    text-decoration: none;
    border-bottom: 1px solid color-mix(in srgb, var(--accent) 40%, transparent);
    padding-bottom: 1px;
  }
  .reviews-more a:hover { border-bottom-color: var(--accent); }

  @media (max-width: 680px) {
    .reviews-top { grid-template-columns: 1fr; gap: 22px; }
    .rep-badge { display: flex; align-items: center; justify-content: center; gap: 18px; text-align: left; }
    .rep-badge .score { font-size: 2.6rem; }
    .rep-badge .biz { border-top: none; border-left: 1px solid var(--line); padding: 0 0 0 16px; margin: 0; }
    .rep-badge .stars { margin: 4px 0; }
  }

  /* ---------- eBay feedback block ---------- */
  .ebay-block {
    margin-top: 40px;
    padding-top: 34px;
    border-top: 1px solid var(--line);
  }
  .ebay-head {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 14px 20px;
    margin-bottom: 6px;
  }
  .ebay-logo { height: 26px; width: auto; flex: 0 0 auto; }
  .ebay-stats {
    display: flex;
    flex-wrap: wrap;
    gap: 8px 10px;
    font-family: var(--font-mono);
    font-size: 0.76rem;
    color: var(--ink-soft);
    align-items: center;
  }
  .ebay-stats .pos {
    color: #0E7A2E;
    font-weight: 700;
    background: #E7F5EB;
    padding: 3px 9px;
    border-radius: 999px;
  }
  .ebay-stats b { color: var(--ink); font-weight: 700; }
  .ebay-intro { color: var(--ink-soft); margin: 12px 0 20px; max-width: 62ch; text-wrap: pretty; }
  .ebay-more { margin-top: 18px; }
  .ebay-more a {
    font-family: var(--font-mono);
    font-size: 0.8rem;
    color: var(--accent-deep);
    text-decoration: none;
    border-bottom: 1px solid color-mix(in srgb, var(--accent) 40%, transparent);
    padding-bottom: 1px;
  }
  .ebay-more a:hover { border-bottom-color: var(--accent); }

  /* ---------- Environmental section ---------- */
  .eco { padding: clamp(48px, 6vw, 80px) 0; background: #E7F5EB; }
  .eco-inner {
    display: grid;
    grid-template-columns: 0.82fr 1.18fr;
    gap: clamp(28px, 5vw, 60px);
    align-items: center;
  }
  .eco-stat {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 30px 26px;
    text-align: center;
  }
  .eco-figure {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: clamp(3.6rem, 8vw, 5.6rem);
    line-height: 0.95;
    letter-spacing: -0.04em;
    color: var(--accent);
  }
  .eco-figure .pct { color: var(--avail); }
  .eco-figure-label {
    font-family: var(--font-mono);
    font-size: 0.78rem;
    line-height: 1.5;
    color: var(--ink-soft);
    margin-top: 14px;
  }
  .eco-copy h2 {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: clamp(1.6rem, 3vw, 2.4rem);
    letter-spacing: -0.03em;
    line-height: 1.08;
    margin: 0 0 14px;
    text-wrap: balance;
  }
  .eco-copy p { margin: 0 0 18px; color: var(--ink-soft); max-width: 62ch; text-wrap: pretty; }
  .eco-points { list-style: none; margin: 0 0 18px; padding: 0; display: grid; gap: 10px; }
  .eco-points li { position: relative; padding-left: 28px; font-size: 0.95rem; line-height: 1.45; }
  .eco-points li::before {
    content: "";
    position: absolute; left: 0; top: 3px;
    width: 17px; height: 17px; border-radius: 50%;
    background: var(--avail);
  }
  .eco-points li::after {
    content: "";
    position: absolute; left: 5px; top: 8px;
    width: 6px; height: 3px;
    border-left: 1.6px solid var(--avail-ink);
    border-bottom: 1.6px solid var(--avail-ink);
    transform: rotate(-45deg);
  }
  .eco-source { font-family: var(--font-mono); font-size: 0.72rem; color: var(--ink-soft); }
  .eco-source a { color: var(--ink-soft); text-decoration: underline; text-underline-offset: 2px; }
  .eco-source a:hover { color: var(--accent); }

  @media (max-width: 720px) {
    .eco-inner { grid-template-columns: 1fr; gap: 26px; }
    .eco-stat { max-width: 320px; }
  }

  /* ---------- See more button ---------- */
  .more-wrap { display: flex; justify-content: center; padding: 4px 0 72px; }
  .more-btn {
    font-family: var(--font-mono);
    font-size: 0.82rem;
    letter-spacing: 0.02em;
    padding: 11px 26px;
    border: 1px solid var(--line-strong);
    background: var(--surface);
    color: var(--ink);
    border-radius: 999px;
    cursor: pointer;
    transition: background .18s var(--ease), border-color .18s var(--ease), transform .12s var(--ease);
  }
  .more-btn:hover { border-color: var(--ink); background: var(--bg); }
  .more-btn:active { transform: translateY(1px); }

  /* ---------- Grading + Delivery split ---------- */
  .gd-split {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: clamp(24px, 3vw, 40px);
    padding: clamp(44px, 6vw, 74px) 0;
    border-top: 1px solid var(--line);
    align-items: stretch;
  }
  .gd-split .grading,
  .gd-split .delivery {
    padding: clamp(24px, 3vw, 34px);
    border: 1px solid var(--line);
    border-radius: 16px;
  }
  .gd-split .grading { background: #F1EEE7; border-color: #E6E1D6; }
  .gd-split .delivery { background: color-mix(in srgb, var(--accent) 6%, #ffffff); }
  @media (max-width: 820px) {
    .gd-split { grid-template-columns: 1fr; gap: 24px; }
  }

  /* ---------- Grading section ---------- */
  .grading { padding: clamp(44px, 6vw, 74px) 0; border-top: 1px solid var(--line); }
  .grading-head { max-width: 62ch; margin: 0 0 28px; }
  .grading-head h2 {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: clamp(1.6rem, 3vw, 2.3rem);
    letter-spacing: -0.03em;
    line-height: 1.08;
    margin: 0 0 12px;
    text-wrap: balance;
  }
  .grading-head p { margin: 0; color: var(--ink-soft); text-wrap: pretty; }
  .grade-scale { display: grid; gap: 12px; }
  .grade-row {
    display: grid;
    grid-template-columns: 54px 130px 1fr;
    gap: 18px;
    align-items: center;
    padding: 14px 4px;
    border-top: 1px solid var(--line);
    background: transparent;
  }
  .grade-row:first-child { border-top: none; padding-top: 0; }
  .grade-dot {
    width: 46px; height: 46px;
    border-radius: 50%;
    display: grid; place-items: center;
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 1.02rem;
    color: #0E1A0E;
    box-shadow: inset 0 -2px 0 rgba(0,0,0,0.1);
  }
  .grade-dot .plus { font-size: 0.7em; }
  .grade-dot.g-aplus { background: #2FBF3F; }
  .grade-dot.g-a { background: #7FD65B; }
  .grade-dot.g-b { background: #C8DE4E; }
  .grade-dot.g-c { background: #F2CE2E; }
  .grade-dot.g-d { background: #F0912E; color: #2A1400; }
  .grade-row .g-label { font-family: var(--font-display); font-weight: 500; font-size: 1.02rem; }
  .grade-row .g-desc { color: var(--ink-soft); font-size: 0.92rem; text-wrap: pretty; }
  @media (max-width: 620px) {
    .grade-row { grid-template-columns: 44px 1fr; gap: 12px 14px; padding: 14px; }
    .grade-row .g-label { grid-column: 2; }
    .grade-row .g-desc { grid-column: 1 / -1; }
    .grade-dot { width: 40px; height: 40px; font-size: 0.92rem; }
  }

  /* ---------- Delivery section ---------- */
  .delivery { padding: clamp(44px, 6vw, 74px) 0; border-top: 1px solid var(--line); }
  .delivery-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 22px;
    align-items: start;
  }
  .delivery-copy h2 {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: clamp(1.6rem, 3vw, 2.3rem);
    letter-spacing: -0.03em;
    line-height: 1.08;
    margin: 0 0 12px;
    text-wrap: balance;
  }
  .delivery-copy p { margin: 0 0 16px; color: var(--ink-soft); max-width: 52ch; text-wrap: pretty; }
  .delivery-copy .free-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font-mono);
    font-weight: 700;
    font-size: 0.8rem;
    padding: 8px 14px;
    border-radius: 999px;
    background: var(--avail);
    color: var(--avail-ink);
    margin-bottom: 16px;
  }
  .delivery-copy .del-note {
    font-family: var(--font-mono);
    font-size: 0.76rem;
    color: var(--ink-soft);
    border-left: 3px solid var(--avail);
    padding-left: 12px;
    line-height: 1.5;
    max-width: 46ch;
  }
  .del-bands { display: grid; gap: 8px; }
  .del-band {
    display: grid;
    grid-template-columns: 92px 1fr;
    gap: 16px;
    align-items: center;
    padding: 10px 14px;
    border-radius: 10px;
    background: var(--surface);
    border: 1px solid var(--line);
  }
  .del-band .price {
    font-family: var(--font-mono);
    font-weight: 700;
    font-size: 0.92rem;
    padding: 6px 4px;
    text-align: center;
    border-radius: 6px;
    color: #241E12;
  }
  .del-band .areas { font-size: 0.9rem; color: var(--ink-soft); line-height: 1.4; text-wrap: pretty; }
  @media (max-width: 780px) {
    .delivery-grid { grid-template-columns: 1fr; gap: 26px; }
  }

  /* ---------- Paint service band ---------- */
  .paint {
    background: var(--accent);
    color: var(--on-accent);
    margin: 8px 0 0;
  }
  .paint-inner {
    display: grid;
    grid-template-columns: 1.1fr 1fr;
    gap: clamp(28px, 5vw, 64px);
    align-items: center;
    padding: clamp(44px, 6vw, 76px) 0;
  }
  .paint h2 {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: clamp(1.8rem, 3.6vw, 2.9rem);
    letter-spacing: -0.03em;
    line-height: 1.05;
    margin: 0 0 16px;
    text-wrap: balance;
  }
  .paint p { margin: 0; max-width: 46ch; color: color-mix(in srgb, var(--on-accent) 88%, var(--accent)); text-wrap: pretty; }
  .paint .price-tag {
    display: inline-flex;
    align-items: baseline;
    gap: 8px;
    margin-top: 22px;
    font-family: var(--font-mono);
    font-weight: 700;
    font-size: 1.35rem;
    padding: 8px 16px;
    border: 1.5px solid color-mix(in srgb, var(--on-accent) 55%, transparent);
    border-radius: 8px;
  }
  .paint .price-tag span { font-weight: 400; font-size: 0.72rem; letter-spacing: 0.06em; text-transform: uppercase; opacity: 0.85; }

  .swatches { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .swatch { text-align: left; }
  .swatch .chip {
    display: block;
    aspect-ratio: 1 / 1;
    border-radius: 10px;
    border: 1px solid color-mix(in srgb, #000 22%, transparent);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.14);
  }
  .swatch .ral { font-family: var(--font-mono); font-weight: 700; font-size: 0.82rem; margin-top: 10px; }
  .swatch .nm { font-family: var(--font-mono); font-size: 0.72rem; opacity: 0.82; line-height: 1.3; }
  .paint .foot-note-line { grid-column: 1 / -1; font-family: var(--font-mono); font-size: 0.74rem; opacity: 0.8; margin-top: 4px; }

  @media (max-width: 720px) {
    .paint-inner { grid-template-columns: 1fr; gap: 38px; padding: 56px 0; }
    .paint h2 { margin-bottom: 14px; }
    .paint .price-tag { margin-top: 26px; }
    .swatches { gap: 18px; }
    .swatch .ral { margin-top: 12px; }
  }

  /* ---------- Footer ---------- */
  footer.site {
    border-top: 1px solid var(--line);
    padding: 40px 0 60px;
  }
  .foot-inner { display: flex; flex-wrap: wrap; justify-content: space-between; gap: 20px; align-items: baseline; }
  .foot-inner .brand { font-size: 1.1rem; }
  .foot-contact { font-family: var(--font-mono); font-size: 0.82rem; color: var(--ink-soft); line-height: 1.9; }
  .foot-contact a { text-decoration: none; }
  .foot-contact a:hover { color: var(--accent); }
  .foot-note { font-family: var(--font-mono); font-size: 0.72rem; color: var(--ink-soft); margin-top: 22px; opacity: 0.8; }

  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 3px; }

  @media (max-width: 760px) {
    .site-nav { display: none; }
  }

  @media (max-width: 560px) {
    .wrap { padding-left: 18px; padding-right: 18px; }
    .site-bar { padding-left: 18px; padding-right: 18px; }
    .grid { grid-template-columns: 1fr; gap: 18px; padding-bottom: 56px; }
    .plate .row { grid-template-columns: 84px 1fr; }
    .hero { padding-bottom: 24px; }
    .hero .meta { margin-top: 22px; }
    .controls { margin-bottom: 26px; }
    .door-body { padding: 18px 18px 20px; }
    .paint-inner { padding-top: 52px; padding-bottom: 52px; }
    footer.site { padding: 32px 0 44px; }
  }

  @media (max-width: 380px) {
    .wrap { padding-left: 15px; padding-right: 15px; }
    .site-bar { padding-left: 15px; padding-right: 15px; }
    .swatches { gap: 10px; }
    .swatch .nm { font-size: 0.68rem; }
    .phone-cta span { display: none; }
    .phone-cta { padding: 9px 11px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .door { opacity: 1; transform: none; transition: none; }
    * { scroll-behavior: auto; }
  }
</style>
</head>
<body>

<header class="site">
  <div class="site-bar">
    <a class="brand" href="#top"><span class="re">Re</span>Door</a>
    <nav class="site-nav" aria-label="Sections">
      <a href="#stock">Stock</a>
      <a href="#grading">Grades</a>
      <a href="#delivery">Delivery</a>
      <a href="#paint">Painting</a>
      <a href="#reviews">Reviews</a>
    </nav>
    <a class="phone-cta" id="headerPhone" href="#">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.9.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      <span id="headerPhoneNum">Call</span>
    </a>
  </div>
</header>

<main id="top">
  <section class="hero wrap">
    <div class="hero-grid">
      <div class="hero-copy">
        <h1 id="heroTitle">Restored garage doors,<br><span class="accent">given a second life.</span></h1>
        <p class="lede" id="heroLede"></p>
        <div class="meta" id="heroMeta"></div>
      </div>
      <aside class="hero-feature" id="heroFeature" hidden></aside>
    </div>
  </section>

  <div class="controls">

        <button class="filter" data-type="Roller" aria-pressed="false">Roller</button>
        <button class="filter" data-type="Up and Over" aria-pressed="false">Up &amp; Over</button>
        <button class="filter" data-type="Side Hinged" aria-pressed="false">Side Hinged</button>
        <button class="filter" data-type="Motors" aria-pressed="false">Motors</button>

          <button data-unit="in" aria-pressed="false">INCH</button>
          <button data-unit="ft" aria-pressed="false">FT</button>
        </div>
        <div class="status-select">
          <select id="statusSelect" aria-label="Show doors by availability">

            <option value="all">All</option>

      </div>
    </div>
  </div>

  <div class="wrap" id="stock">
    <div class="grid" id="grid"></div>
    <div class="more-wrap" id="moreWrap" hidden>
      <button class="more-btn" id="moreBtn" type="button">See more</button>
    </div>
  </div>

  <section class="paint" id="paint" hidden>
    <div class="wrap paint-inner" id="paintInner"></div>
  </section>

  <section class="gd-split wrap">
    <div class="grading" id="grading" hidden></div>
    <div class="delivery" id="delivery" hidden></div>
  </section>

  <section class="eco" id="eco" hidden>
    <div class="wrap eco-inner" id="ecoInner"></div>
  </section>

  <section class="reviews wrap" id="reviews" hidden></section>
</main>

<footer class="site">
  <div class="wrap foot-inner">
    <div>
      <a class="brand" href="#top"><span class="re">Re</span>Door</a>
      <p class="foot-note">Every door is one-off, reclaimed stock. Sizes are approximate — measure your opening before buying.</p>
    </div>
    <div class="foot-contact" id="footContact"></div>
  </div>
</footer>

  <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51l-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.71.306 1.263.489 1.694.625.712.227 1.36.195 1.872.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893A11.821 11.821 0 0020.885 3.4"/></svg>

<script src="doors.js"></script>
<script>
(function () {
  var D = window.REDOOR_DATA || { config: {}, doors: [] };
  var cfg = D.config || {};
  var doors = Array.isArray(D.doors) ? D.doors.slice() : [];

  var DOOR_SVG =
    '<svg viewBox="0 0 100 80" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">' +
    '<rect x="8" y="6" width="84" height="68" rx="2" stroke="#9BA3AD" stroke-width="2"/>' +
    '<line x1="8" y1="23" x2="92" y2="23" stroke="#9BA3AD" stroke-width="2"/>' +
    '<line x1="8" y1="40" x2="92" y2="40" stroke="#9BA3AD" stroke-width="2"/>' +
    '<line x1="8" y1="57" x2="92" y2="57" stroke="#9BA3AD" stroke-width="2"/>' +
    '</svg>';

  function gradeClass(g) {
    var map = { "A+": "g-aplus", "A": "g-a", "B": "g-b", "C": "g-c", "D": "g-d" };
    return map[String(g || "").toUpperCase()] || "";
  }
  function gradeMarkup(g) {
    g = String(g || "").toUpperCase();
    if (g === "A+") return 'A<span class="plus">+</span>';
    return g;
  }

  function esc(s) {
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
  }

  function money(n) {
    if (n == null || n === "") return "";
    if (typeof n === "number") return "£" + n.toLocaleString("en-GB");
    return esc(n);
  }

  function mailtoFor(door) {
    var to = cfg.contactEmail || "";
    var subj = "ReDoor enquiry: " + (door ? door.title : "");
    var body = door
      ? "Hi,\n\nI'm interested in this door:\n\n" + door.title + " — " + money(door.price) +
        "\n(ref " + door.id + ")\n\nIs it still available?\n\nThanks"
      : "Hi, I'd like to ask about a door.";
    return "mailto:" + encodeURIComponent(to) +
      "?subject=" + encodeURIComponent(subj) +
      "&body=" + encodeURIComponent(body);
  }

  // WhatsApp number from the phone (strip non-digits, normalise UK leading 0)
  var waNumber = (function () {
    var raw = cfg.whatsapp || cfg.contactPhone || "";
    var d = String(raw).replace(/[^\d]/g, "");
    if (d.charAt(0) === "0") d = "44" + d.slice(1);
    return d;
  })();
  function waFor(door) {
    var msg = door
      ? "Hi, I'm interested in the " + door.title + " (" + money(door.price) + ") on ReDoor. Is it still available?"
      : "Hi, I saw ReDoor and I'm interested in a restored garage door.";
    return "https://wa.me/" + waNumber + "?text=" + encodeURIComponent(msg);
  }
  var WA_ICON = '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51l-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.71.306 1.263.489 1.694.625.712.227 1.36.195 1.872.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893A11.821 11.821 0 0020.885 3.4"/></svg>';

  // wire the floating WhatsApp button
  var fab = document.getElementById("waFab");
  if (fab && waNumber) { fab.href = waFor(null); fab.hidden = false; }

  // Structured data: one Product per door (helps Google understand the stock)
  try {
    var canonEl = document.querySelector('link[rel="canonical"]');
    var base = (canonEl ? canonEl.href : (location.origin + location.pathname)).replace(/\/$/, "");
    var products = doors.map(function (d) {
      var imgs = (d.photos || []).filter(function (p) { return /^images\//.test(p); })
        .map(function (p) { return base + "/" + p; });
      var prod = {
        "@context": "https://schema.org",
        "@type": "Product",
        "name": d.title,
        "category": "Garage door",
        "itemCondition": "https://schema.org/UsedCondition",
        "offers": {
          "@type": "Offer",
          "priceCurrency": "GBP",
          "price": (typeof d.price === "number" ? d.price : String(d.price || "")),
          "availability": d.status === "sold" ? "https://schema.org/SoldOut" : "https://schema.org/InStock",
          "itemCondition": "https://schema.org/UsedCondition"
        }
      };
      if (d.description) prod.description = d.description;
      if (imgs.length) prod.image = imgs;
      return prod;
    });
    var sd = document.createElement("script");
    sd.type = "application/ld+json";
    sd.textContent = JSON.stringify(products);
    document.head.appendChild(sd);
  } catch (e) {}

  // ---- Hero + contact ----
  document.getElementById("heroLede").textContent =
    cfg.blurb || cfg.tagline || "";

  var avail = doors.filter(function (d) { return d.status !== "sold"; });
  var sold = doors.filter(function (d) { return d.status === "sold"; });

  var metaBits = [];
  var rep0 = D.reputation;
  if (rep0 && rep0.rating) {
    metaBits.push(
      '<a class="rating-pill" href="' + esc(rep0.reviewsUrl || "#") + '" target="_blank" rel="noopener">' +
        '<span class="stars">★★★★★</span> ' +
        '<b>' + rep0.rating.toFixed(1) + '</b> ' +
        '<span class="lbl">' + esc(rep0.reviewCount) + ' Google reviews</span>' +
      '</a>'
    );
  }
  metaBits.push('<span><span class="dot"></span><b>' + avail.length + '</b> available now</span>');
  if (cfg.area) metaBits.push("<span>" + esc(cfg.area) + "</span>");
  if (cfg.lastUpdated) metaBits.push("<span>Updated " + esc(cfg.lastUpdated) + "</span>");
  document.getElementById("heroMeta").innerHTML = metaBits.join("");

  // ---- Hero featured door ----
  var featList = avail.slice().sort(function (a, b) {
    return String(b.dateAdded || "").localeCompare(String(a.dateAdded || ""));
  });
  var feat = null;
  for (var fi = 0; fi < featList.length; fi++) {
    if (featList[fi].photos && featList[fi].photos.length) { feat = featList[fi]; break; }
  }
  if (!feat) feat = featList[0];
  if (feat) {
    var fphoto = (feat.photos && feat.photos.length)
      ? '<img src="' + esc(feat.photos[0]) + '" alt="' + esc(feat.title) + '" />'
      : '<div style="width:100%;height:100%;display:grid;place-items:center;background:linear-gradient(#E8EAED,#D6DADE)">' + DOOR_SVG + "</div>";
    var fspec = [];
    if (feat.type) fspec.push(esc(feat.type));
    if (feat.condition) fspec.push(esc(feat.condition));
    if (feat.dim && feat.dim.w && feat.dim.h) {
      fspec.push('<span class="szv" data-w="' + feat.dim.w + '" data-h="' + feat.dim.h + '">' + sizeText(feat.dim, "mm") + "</span>");
    } else if (feat.size) fspec.push(esc(feat.size));
    else if (feat.age) fspec.push(esc(feat.age));
    document.getElementById("heroFeature").innerHTML =
      '<div class="hf-photo">' + fphoto + '<div class="hf-tag">IN STOCK NOW</div></div>' +
      '<div class="hf-body">' +
        '<div class="hf-head">' +
          '<h2 class="hf-title">' + esc(feat.title) + "</h2>" +
          '<div class="hf-price">' + money(feat.price) + "</div>" +
        "</div>" +
        (fspec.length ? '<p class="hf-spec">' + fspec.join(" &middot; ") + "</p>" : "") +
        '<a class="hf-cta" href="' + mailtoFor(feat) + '">Ask about this door <span class="arr">&rarr;</span></a>' +
      "</div>";
    document.getElementById("heroFeature").hidden = false;
  }

  var hp = document.getElementById("headerPhone");
  if (cfg.contactPhone) {
    hp.href = "tel:" + cfg.contactPhone.replace(/\s+/g, "");
    document.getElementById("headerPhoneNum").textContent = cfg.contactPhone;
  } else {
    hp.href = mailtoFor(null);
    document.getElementById("headerPhoneNum").textContent = "Get in touch";
  }

  var footParts = [];
  if (cfg.contactEmail) footParts.push('<a href="' + mailtoFor(null) + '">' + esc(cfg.contactEmail) + "</a>");
  if (cfg.contactPhone) footParts.push('<a href="tel:' + esc(cfg.contactPhone.replace(/\s+/g, "")) + '">' + esc(cfg.contactPhone) + "</a>");
  if (cfg.area) footParts.push(esc(cfg.area));
  document.getElementById("footContact").innerHTML = footParts.join("<br>");

  // ---- Reviews / trust section ----
  var rep = D.reputation;
  if (rep && rep.quotes && rep.quotes.length) {
    var standoutChips = (rep.standouts || []).map(function (s) {
      return '<span class="chip">' + esc(s) + "</span>";
    }).join("");
    var quoteCards = rep.quotes.map(function (q) {
      return (
        '<figure class="review-card">' +
          '<div class="rc-stars">★★★★★</div>' +
          "<blockquote>&ldquo;" + esc(q.text) + "&rdquo;</blockquote>" +
          '<figcaption class="rc-name">' + esc(q.name) + "</figcaption>" +
        "</figure>"
      );
    }).join("");
    var moreLink = rep.reviewsUrl
      ? '<div class="reviews-more"><a href="' + esc(rep.reviewsUrl) + '" target="_blank" rel="noopener">Read all ' + esc(rep.reviewCount) + " reviews on Google &rarr;</a></div>"
      : "";
    document.getElementById("reviews").innerHTML =
      '<div class="reviews-top">' +
        '<div class="rep-badge">' +
          '<div class="score">' + rep.rating.toFixed(1) + "</div>" +
          '<div class="stars">★★★★★</div>' +
          '<div class="count">' + esc(rep.reviewCount) + " Google reviews</div>" +
          (rep.formerBusiness ? '<div class="biz">' + esc(rep.formerBusiness) + "</div>" : "") +
        "</div>" +
        '<div class="reviews-lead">' +
          "<h2>5 star work since 1996</h2>" +
          (rep.intro ? "<p>" + esc(rep.intro) + "</p>" : "") +
          (standoutChips ? '<div class="standouts">' + standoutChips + "</div>" : "") +
        "</div>" +
      "</div>" +
      '<div class="quote-grid">' + quoteCards + "</div>" +
      moreLink;

    // eBay feedback block
    var eb = rep.ebay;
    if (eb && eb.quotes && eb.quotes.length) {
      var EBAY_LOGO =
        '<svg class="ebay-logo" viewBox="0 0 92 37" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="eBay">' +
        '<text x="0" y="29" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" font-style="italic">' +
        '<tspan fill="#E53238">e</tspan><tspan fill="#0064D2">b</tspan><tspan fill="#F5AF02">a</tspan><tspan fill="#86B817">y</tspan>' +
        "</text></svg>";
      var ebCards = eb.quotes.map(function (q) {
        return (
          '<figure class="review-card">' +
            '<div class="rc-stars">★★★★★</div>' +
            "<blockquote>&ldquo;" + esc(q.text) + "&rdquo;</blockquote>" +
            '<figcaption class="rc-name">' + esc(q.name) + " &middot; verified eBay buyer</figcaption>" +
          "</figure>"
        );
      }).join("");
      var ebStats = [];
      if (eb.positive) ebStats.push('<span class="pos">' + esc(eb.positive) + " positive</span>");
      if (eb.feedbackScore) ebStats.push("<span><b>" + esc(eb.feedbackScore) + "</b> feedback</span>");
      if (eb.itemsSold) ebStats.push("<span><b>" + esc(eb.itemsSold) + "</b> items sold</span>");
      if (eb.memberSince) ebStats.push("<span>Seller since " + esc(eb.memberSince) + "</span>");
      document.getElementById("reviews").innerHTML +=
        '<div class="ebay-block">' +
          '<div class="ebay-head">' + EBAY_LOGO +
            '<div class="ebay-stats">' + ebStats.join("") + "</div>" +
          "</div>" +
          (eb.intro ? '<p class="ebay-intro">' + esc(eb.intro) + "</p>" : "") +
          '<div class="quote-grid">' + ebCards + "</div>" +
          (eb.url ? '<div class="ebay-more"><a href="' + esc(eb.url) + '" target="_blank" rel="noopener">See all feedback on eBay &rarr;</a></div>' : "") +
        "</div>";
    }

    document.getElementById("reviews").hidden = false;
  }

  // ---- Paint service band ----
  var ps = D.paintService;
  if (ps && ps.colours && ps.colours.length) {
    var swatches = ps.colours.map(function (c) {
      return (
        '<div class="swatch">' +
          '<span class="chip" style="background:' + esc(c.hex) + '"></span>' +
          '<div class="ral">' + esc(c.ral) + "</div>" +
          '<div class="nm">' + esc(c.name) + "</div>" +
        "</div>"
      );
    }).join("");
    var paintMail = "mailto:" + encodeURIComponent(cfg.contactEmail || "") +
      "?subject=" + encodeURIComponent("ReDoor: paint a door") +
      "&body=" + encodeURIComponent("Hi, I'd like a door painted. Colour / RAL: \n\nThanks");
    document.getElementById("paintInner").innerHTML =
      "<div>" +
        "<h2>" + esc(ps.heading) + "</h2>" +
        (ps.blurb ? "<p>" + esc(ps.blurb) + "</p>" : "") +
        (ps.price ? '<a class="price-tag" href="' + paintMail + '">' + esc(ps.price) + " <span>per door</span></a>" : "") +
      "</div>" +
      '<div><div class="swatches">' + swatches + "</div>" +
        (ps.note ? '<p class="foot-note-line">' + esc(ps.note) + "</p>" : "") +
      "</div>";
    document.getElementById("paint").hidden = false;
  }

  // ---- Environmental section ----
  var env = D.environment;
  if (env) {
    var pts = (env.points || []).map(function (p) { return "<li>" + esc(p) + "</li>"; }).join("");
    var statHtml = esc(env.stat) + (String(env.stat).indexOf("%") < 0 ? '<span class="pct">%</span>' : "");
    document.getElementById("ecoInner").innerHTML =
      '<div class="eco-stat">' +
        '<div class="eco-figure">' + statHtml + "</div>" +
        '<div class="eco-figure-label">' + esc(env.statLabel || "") + "</div>" +
      "</div>" +
      '<div class="eco-copy">' +
        "<h2>" + esc(env.heading) + "</h2>" +
        (env.body ? "<p>" + esc(env.body) + "</p>" : "") +
        (pts ? '<ul class="eco-points">' + pts + "</ul>" : "") +
        (env.source
          ? '<div class="eco-source">Source: ' + (env.sourceUrl
              ? '<a href="' + esc(env.sourceUrl) + '" target="_blank" rel="noopener">' + esc(env.source) + "</a>"
              : esc(env.source)) + "</div>"
          : "") +
      "</div>";
    document.getElementById("eco").hidden = false;
  }

  // ---- Grading section ----
  var gr = D.grading;
  if (gr && gr.scale && gr.scale.length) {
    var rows = gr.scale.map(function (s) {
      return (
        '<div class="grade-row">' +
          '<div class="grade-dot ' + gradeClass(s.grade) + '">' + gradeMarkup(s.grade) + "</div>" +
          '<div class="g-label">' + esc(s.label) + "</div>" +
          '<div class="g-desc">' + esc(s.desc) + "</div>" +
        "</div>"
      );
    }).join("");
    document.getElementById("grading").innerHTML =
      '<div class="grading-head">' +
        "<h2>" + esc(gr.heading || "How we grade") + "</h2>" +
        (gr.blurb ? "<p>" + esc(gr.blurb) + "</p>" : "") +
      "</div>" +
      '<div class="grade-scale">' + rows + "</div>";
    document.getElementById("grading").hidden = false;
  }

  // ---- Delivery section ----
  var dl = D.delivery;
  if (dl && dl.bands && dl.bands.length) {
    var bands = dl.bands.map(function (b) {
      return (
        '<div class="del-band">' +
          '<div class="price" style="background:' + esc(b.colour) + '">' + esc(b.price) + "</div>" +
          '<div class="areas">' + esc(b.areas) + "</div>" +
        "</div>"
      );
    }).join("");
    document.getElementById("delivery").innerHTML =
      '<div class="delivery-grid">' +
        '<div class="delivery-copy">' +
          "<h2>" + esc(dl.heading || "Delivery") + "</h2>" +
          (dl.freeLabel ? '<div class="free-pill">' + esc(dl.freeLabel) + "</div>" : "") +
          (dl.blurb ? "<p>" + esc(dl.blurb) + "</p>" : "") +
          (dl.note ? '<p class="del-note">' + esc(dl.note) + "</p>" : "") +
        "</div>" +
        '<div class="del-bands">' + bands + "</div>" +
      "</div>";
    document.getElementById("delivery").hidden = false;
  }

  // ---- measurement units ----
  var currentUnit = "mm";
  function round1(n) { return (Math.round(n * 10) / 10).toString(); }
  function conv(mm, u) {
    if (u === "cm") return round1(mm / 10);
    if (u === "in") return round1(mm / 25.4);
    if (u === "ft") return round1(mm / 304.8);
    return Math.round(mm).toString();
  }
  function sizeText(dim, u) {
    if (!dim || !dim.w || !dim.h) return "";
    return conv(dim.w, u) + " × " + conv(dim.h, u) + " " + u;
  }

  var ARROW_L = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>';
  var ARROW_R = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>';

  function byDateDesc(a, b) {
    return String(b.dateAdded || "").localeCompare(String(a.dateAdded || ""));
  }
  function orderCmp(a, b) {
    var sa = a.status === "sold" ? 1 : 0, sb = b.status === "sold" ? 1 : 0;
    if (sa !== sb) return sa - sb;
    return byDateDesc(a, b);
  }

  var grid = document.getElementById("grid");
  var io = ("IntersectionObserver" in window)
    ? new IntersectionObserver(function (entries) {
        entries.forEach(function (e) {
          if (e.isIntersecting) { e.target.classList.add("in"); io.unobserve(e.target); }
        });
      }, { rootMargin: "0px 0px -40px 0px" })
    : null;

  function specRow(k, v) {
    if (!v) return "";
    return '<div class="row"><div class="k">' + esc(k) + '</div><div class="v">' + v + "</div></div>";
  }

  function photoBlock(d) {
    if (d.photos && d.photos.length > 1) {
      var imgs = d.photos.map(function (p) {
        return '<img src="' + esc(p) + '" alt="' + esc(d.title) + '" loading="lazy" />';
      }).join("");
      var dots = d.photos.map(function (p, idx) {
        return '<button type="button" class="cdot" data-i="' + idx + '" aria-current="' + (idx === 0 ? "true" : "false") + '" aria-label="Photo ' + (idx + 1) + '"></button>';
      }).join("");
      return '<div class="carousel" data-i="0">' +
          '<div class="car-track">' + imgs + "</div>" +
          '<button type="button" class="car-btn prev" aria-label="Previous photo">' + ARROW_L + "</button>" +
          '<button type="button" class="car-btn next" aria-label="Next photo">' + ARROW_R + "</button>" +
          '<div class="car-dots">' + dots + "</div>" +
        "</div>";
    }
    if (d.photos && d.photos.length === 1) {
      return '<img src="' + esc(d.photos[0]) + '" alt="' + esc(d.title) + '" loading="lazy" />';
    }
    return '<div class="ph">' + DOOR_SVG + "</div>";
  }

  function sizeCell(d) {
    var inner = "";
    if (d.dim && d.dim.w && d.dim.h) {
      inner = '<span class="szv" data-w="' + d.dim.w + '" data-h="' + d.dim.h + '">' + sizeText(d.dim, currentUnit) + "</span>";
    } else if (d.size) {
      inner = esc(d.size);
    }
    if (inner && d.sizeAdjustable) {
      inner += ' <span class="adj">· ' + esc(d.sizeNote || "adjustable") + "</span>";
    }
    return inner;
  }

  function cardHTML(d) {
    var stamp = d.status === "sold"
      ? '<div class="stamp sold">SOLD</div>'
      : (d.dateAdded ? '<div class="stamp">NEW IN</div>' : "");
    var badge = (d.grade && gradeClass(d.grade))
      ? '<div class="grade-badge ' + gradeClass(d.grade) + '" title="Grade ' + esc(d.grade) + '" aria-label="Grade ' + esc(d.grade) + '">' + gradeMarkup(d.grade) + "</div>"
      : "";
    var chips = (d.colourOptions || []).map(function (c) {
      return '<span class="chip">' + esc(c) + "</span>";
    }).join("");
    var cta;
    if (d.status === "sold") {
      cta = '<span class="ask disabled">Sold</span>';
    } else if (waNumber) {
      cta = '<a class="ask wa" href="' + waFor(d) + '" target="_blank" rel="noopener">' + WA_ICON + " WhatsApp</a>" +
            '<a class="ask email" href="' + mailtoFor(d) + '" aria-label="Email about ' + esc(d.title) + '">Email</a>';
    } else {
      cta = '<a class="ask" href="' + mailtoFor(d) + '">Ask about this door &rarr;</a>';
    }

    return (
      '<article class="door ' + (d.status === "sold" ? "sold" : "") + '">' +
        '<div class="photo">' + photoBlock(d) + stamp + badge + "</div>" +
        '<div class="door-body">' +
          '<div class="door-head">' +
            '<h2 class="door-title">' + esc(d.title) + "</h2>" +
            '<div class="price">' + money(d.price) +
              (d.priceNote ? '<span class="note">' + esc(d.priceNote) + "</span>" : "") +
            "</div>" +
          "</div>" +
          (d.description ? '<p class="desc">' + esc(d.description) + "</p>" : "") +
          '<div class="plate">' +
            specRow("Type", esc(d.type)) +
            specRow("Condition", esc(d.condition)) +
            specRow("Age", esc(d.age)) +
            specRow("Size", sizeCell(d)) +
          "</div>" +
          (chips ? '<div class="colours">' + chips + "</div>" : "") +
          '<div class="door-foot">' + cta + "</div>" +
        "</div>" +
      "</article>"
    );
  }

  var currentType = "all";
  var currentStatus = "available";

  function passesType(d) { return currentType === "all" ? true : d.category === currentType; }
  function passesStatus(d) {
    if (currentStatus === "all") return true;
    if (currentStatus === "sold") return d.status === "sold";
    return d.status !== "sold";
  }

  var PAGE_SIZE = 3;
  var visibleCount = PAGE_SIZE;
  var moreWrap = document.getElementById("moreWrap");
  var moreBtn = document.getElementById("moreBtn");

  function render() {
    var list = doors.filter(function (d) { return passesType(d) && passesStatus(d); }).sort(orderCmp);
    if (!list.length) {
      grid.innerHTML = '<div class="empty">Nothing of that type to show right now. Try another filter, or check back soon.</div>';
      if (moreWrap) moreWrap.hidden = true;
      return;
    }
    var shown = list.slice(0, visibleCount);
    grid.innerHTML = shown.map(cardHTML).join("");
    var cards = grid.querySelectorAll(".door");
    for (var i = 0; i < cards.length; i++) {
      var c = cards[i];
      c.style.transitionDelay = Math.min(i * 45, 320) + "ms";
      if (io) io.observe(c); else c.classList.add("in");
    }
    var remaining = list.length - visibleCount;
    if (moreWrap && moreBtn) {
      if (remaining > 0) {
        moreWrap.hidden = false;
        moreBtn.textContent = "See more (" + remaining + ")";
      } else {
        moreWrap.hidden = true;
      }
    }
  }

  if (moreBtn) moreBtn.addEventListener("click", function () {
    visibleCount += PAGE_SIZE;
    render();
  });

  // type filter buttons
  var typeBtns = document.querySelectorAll("#typeFilters .filter");
  Array.prototype.forEach.call(typeBtns, function (b) {
    b.addEventListener("click", function () {
      Array.prototype.forEach.call(typeBtns, function (x) { x.setAttribute("aria-pressed", "false"); });
      b.setAttribute("aria-pressed", "true");
      currentType = b.getAttribute("data-type");
      visibleCount = PAGE_SIZE;
      render();
    });
  });

  // status dropdown
  var statusSel = document.getElementById("statusSelect");
  if (statusSel) statusSel.addEventListener("change", function () {
    currentStatus = statusSel.value;
    visibleCount = PAGE_SIZE;
    render();
  });

  // unit switch
  var unitBtns = document.querySelectorAll("#unitSwitch button");
  Array.prototype.forEach.call(unitBtns, function (b) {
    b.addEventListener("click", function () {
      Array.prototype.forEach.call(unitBtns, function (x) { x.setAttribute("aria-pressed", "false"); });
      b.setAttribute("aria-pressed", "true");
      currentUnit = b.getAttribute("data-unit");
      var cells = document.querySelectorAll(".szv");
      for (var i = 0; i < cells.length; i++) {
        cells[i].textContent = sizeText(
          { w: +cells[i].getAttribute("data-w"), h: +cells[i].getAttribute("data-h") },
          currentUnit
        );
      }
    });
  });

  // carousel navigation (event delegation)
  grid.addEventListener("click", function (e) {
    var car = e.target.closest ? e.target.closest(".carousel") : null;
    if (!car) return;
    var isNext = e.target.closest(".car-btn.next");
    var isPrev = e.target.closest(".car-btn.prev");
    var dot = e.target.closest(".cdot");
    var track = car.querySelector(".car-track");
    var n = track.children.length;
    var i = parseInt(car.getAttribute("data-i") || "0", 10);
    if (isNext) i = (i + 1) % n;
    else if (isPrev) i = (i - 1 + n) % n;
    else if (dot) i = parseInt(dot.getAttribute("data-i"), 10);
    else return;
    car.setAttribute("data-i", i);
    track.style.transform = "translateX(-" + (i * 100) + "%)";
    var dots = car.querySelectorAll(".cdot");
    for (var k = 0; k < dots.length; k++) dots[k].setAttribute("aria-current", k === i ? "true" : "false");
  });

  render();
})();
</script>
</body>
</html>
