<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ReDoor — design mockup</title>
<meta name="description" content="Design direction mockup for ReDoor. Flip themes top-right." />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

<style>
  /* =========================================================
     THEMES — flip with the switcher (top-right).
     A · Foundry   dark salvage-catalogue, bone paper cards
     B · Oxblood   drenched colour, brass highlight
     C · Workshop  refined light, committed (not cream)
     ========================================================= */

  :root[data-theme="foundry"] {
    --bg:        #171310;
    --bg-2:      #211A14;
    --bg-line:   rgba(234,224,207,0.14);
    --on-bg:     #ECE2D0;
    --on-bg-soft:#B3A78F;

    --surface:   #F1EADB;
    --ink:       #211B14;
    --ink-soft:  #5C5344;
    --line:      #DBD1BE;
    --line-2:    #C8BCA4;
    --plate-bg:  #F7F2E7;

    --accent:    #C4502E;
    --accent-deep:#A63F22;
    --brass:     #D2963C;
    --emph:      #E8734B;   /* accent text on the dark ground */
    --on-accent: #FFFFFF;

    --field:     #EDE6D6;   /* placeholder plate ground */
    --field-ink: #B6A98F;
  }

  :root[data-theme="oxblood"] {
    --bg:        #55211C;
    --bg-2:      #64251E;
    --bg-line:   rgba(243,228,214,0.16);
    --on-bg:     #F4E6D8;
    --on-bg-soft:#E0BCAD;

    --surface:   #F4EDDE;
    --ink:       #2A1C15;
    --ink-soft:  #62513F;
    --line:      #E0D5C0;
    --line-2:    #CDBFA6;
    --plate-bg:  #FAF4E9;

    --accent:    #B84428;
    --accent-deep:#9c3720;
    --brass:     #D89A3E;
    --emph:      #E7B15A;   /* gold reads on oxblood */
    --on-accent: #FFFFFF;

    --field:     #EFE7D6;
    --field-ink: #BBA98C;
  }

  :root[data-theme="workshop"] {
    --bg:        #E7E2D7;
    --bg-2:      #EFEBE2;
    --bg-line:   rgba(33,27,20,0.12);
    --on-bg:     #23201A;
    --on-bg-soft:#5B5449;

    --surface:   #FBF9F3;
    --ink:       #201C15;
    --ink-soft:  #57503f;
    --line:      #DAD4C6;
    --line-2:    #C6BEAC;
    --plate-bg:  #F2EEE3;

    --accent:    #B0432B;
    --accent-deep:#8F3421;
    --brass:     #B07C2A;
    --emph:      #8F3421;   /* deep terracotta on light */
    --on-accent: #FFFFFF;

    --field:     #EDE8DB;
    --field-ink: #ABA085;
  }

  :root {
    --font-display: "Fraunces", Georgia, serif;
    --font-body: "Inter", system-ui, sans-serif;
    --font-mono: "Space Mono", ui-monospace, monospace;
    --maxw: 1200px;
    --radius: 14px;
    --z-header: 100;
    --ease: cubic-bezier(0.22, 1, 0.36, 1);
  }

  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--on-bg);
    font-family: var(--font-body);
    font-size: 16px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    transition: background .5s var(--ease), color .5s var(--ease);
  }
  a { color: inherit; }

  .wrap { width: 100%; max-width: var(--maxw); margin: 0 auto; padding: 0 28px; }

  /* ---------- Theme switcher ---------- */
  .switch {
    position: fixed; top: 16px; right: 16px; z-index: 200;
    display: flex; gap: 4px; padding: 5px;
    background: color-mix(in srgb, var(--bg) 82%, transparent);
    border: 1px solid var(--bg-line);
    border-radius: 999px;
    backdrop-filter: blur(10px);
    font-family: var(--font-mono);
  }
  .switch button {
    font: inherit; font-size: 0.72rem; letter-spacing: 0.02em;
    color: var(--on-bg-soft);
    background: transparent; border: 0; cursor: pointer;
    padding: 6px 13px; border-radius: 999px;
    transition: color .2s var(--ease), background .2s var(--ease);
  }
  .switch button:hover { color: var(--on-bg); }
  .switch button[aria-pressed="true"] { color: var(--on-accent); background: var(--accent); }

  /* ---------- Header ---------- */
  header.site {
    position: sticky; top: 0; z-index: var(--z-header);
    background: color-mix(in srgb, var(--bg) 84%, transparent);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--bg-line);
  }
  .site-bar {
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; padding: 15px 28px; max-width: var(--maxw); margin: 0 auto;
  }
  .brand {
    font-family: var(--font-display);
    font-weight: 600; font-size: 1.4rem; letter-spacing: -0.01em;
    text-decoration: none; display: inline-flex; align-items: baseline;
  }
  .brand .re { color: var(--emph); font-style: italic; }
  .site-contact {
    font-family: var(--font-mono); font-size: 0.76rem;
    color: var(--on-bg-soft); text-decoration: none; white-space: nowrap;
    border: 1px solid var(--bg-line); padding: 8px 15px; border-radius: 999px;
    transition: color .2s var(--ease), border-color .2s var(--ease);
  }
  .site-contact:hover { color: var(--on-bg); border-color: var(--on-bg-soft); }

  /* ---------- Hero ---------- */
  .hero { padding: clamp(52px, 10vw, 116px) 0 clamp(30px, 5vw, 54px); position: relative; }
  .hero .kicker {
    font-family: var(--font-mono); font-size: 0.76rem; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--emph);
    display: inline-flex; align-items: center; gap: 10px; margin: 0 0 22px;
  }
  .hero .kicker::before { content: ""; width: 26px; height: 1px; background: var(--emph); }
  .hero h1 {
    font-family: var(--font-display);
    font-weight: 500; font-optical-sizing: auto;
    font-size: clamp(2.7rem, 7.4vw, 5.1rem);
    line-height: 1.0; letter-spacing: -0.02em;
    margin: 0 0 26px; max-width: 16ch; text-wrap: balance;
  }
  .hero h1 em { font-style: italic; color: var(--emph); font-weight: 500; }
  .hero .lede {
    font-size: clamp(1.04rem, 1.5vw, 1.24rem);
    color: var(--on-bg-soft); max-width: 56ch; margin: 0; text-wrap: pretty;
  }
  .hero .meta {
    margin-top: 30px; display: flex; flex-wrap: wrap; gap: 10px 26px;
    font-family: var(--font-mono); font-size: 0.78rem; color: var(--on-bg-soft);
    align-items: center;
  }
  .hero .meta b { color: var(--on-bg); font-weight: 700; }
  .hero .meta .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--brass); display: inline-block; margin-right: 8px; vertical-align: middle; }

  /* ---------- Controls ---------- */
  .controls {
    position: sticky; top: 56px; z-index: 40;
    background: color-mix(in srgb, var(--bg) 84%, transparent);
    backdrop-filter: blur(10px);
    padding: 13px 0; border-top: 1px solid var(--bg-line);
    border-bottom: 1px solid var(--bg-line); margin-bottom: 38px;
  }
  .controls-inner { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .filter {
    font-family: var(--font-mono); font-size: 0.76rem; letter-spacing: 0.01em;
    padding: 7px 15px; border: 1px solid var(--bg-line); background: transparent;
    color: var(--on-bg-soft); border-radius: 999px; cursor: pointer;
    transition: color .2s var(--ease), background .2s var(--ease), border-color .2s var(--ease);
  }
  .filter:hover { color: var(--on-bg); border-color: var(--on-bg-soft); }
  .filter[aria-pressed="true"] { background: var(--on-bg); color: var(--bg); border-color: var(--on-bg); }
  .filter .n { opacity: 0.55; }

  /* ---------- Grid ---------- */
  .grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
    gap: 26px; padding-bottom: 90px;
  }
  .door {
    background: var(--surface); color: var(--ink);
    border: 1px solid var(--line); border-radius: var(--radius);
    overflow: hidden; display: flex; flex-direction: column;
    transition: transform .3s var(--ease), box-shadow .3s var(--ease);
    opacity: 0; transform: translateY(16px);
  }
  .door.in { opacity: 1; transform: none; }
  .door:hover { transform: translateY(-5px); box-shadow: 0 22px 44px -26px rgba(0,0,0,0.5); }
  .door.sold { opacity: 0.9; }

  /* photo / archival plate */
  .photo { position: relative; aspect-ratio: 4 / 3; background: var(--field); overflow: hidden; }
  .photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .photo .plate-svg { position: absolute; inset: 0; width: 100%; height: 100%; }
  .photo .plate-ref {
    position: absolute; left: 14px; bottom: 12px;
    font-family: var(--font-mono); font-size: 0.66rem; letter-spacing: 0.08em;
    color: var(--field-ink); text-transform: uppercase;
  }

  .stamp {
    position: absolute; top: 14px; left: 14px;
    font-family: var(--font-mono); font-weight: 700; font-size: 0.68rem;
    letter-spacing: 0.16em; padding: 5px 10px 4px;
    color: var(--on-accent); background: var(--accent); border-radius: 5px;
  }
  .stamp.new { background: var(--brass); color: #23180a; }
  .stamp.sold {
    color: var(--surface); background: var(--ink); transform: rotate(-4deg);
    border: 2px solid var(--surface); box-shadow: 0 0 0 1px var(--ink);
    font-size: 0.8rem; letter-spacing: 0.22em; padding: 6px 12px 5px;
  }

  .door-body { padding: 22px 21px 23px; display: flex; flex-direction: column; gap: 16px; flex: 1; }
  .door-head { display: flex; justify-content: space-between; align-items: baseline; gap: 14px; }
  .door-title {
    font-family: var(--font-display); font-weight: 500; font-size: 1.32rem;
    letter-spacing: -0.01em; line-height: 1.12; margin: 0; text-wrap: balance;
  }
  .price {
    font-family: var(--font-mono); font-weight: 700; font-size: 1.16rem;
    white-space: nowrap; color: var(--ink);
  }
  .price .note { font-size: 0.64rem; font-weight: 400; color: var(--ink-soft); display: block; text-align: right; letter-spacing: 0.05em; margin-top: 2px; }
  .desc { font-size: 0.93rem; color: var(--ink-soft); margin: 0; text-wrap: pretty; }

  /* spec plate — signature element */
  .plate { border: 1px solid var(--line); border-radius: 9px; background: var(--plate-bg); overflow: hidden; }
  .plate .row {
    display: grid; grid-template-columns: 92px 1fr; gap: 12px; padding: 9px 13px;
    font-family: var(--font-mono); font-size: 0.78rem; line-height: 1.4;
    border-top: 1px solid var(--line);
  }
  .plate .row:first-child { border-top: none; }
  .plate .k { color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.07em; font-size: 0.66rem; padding-top: 2px; }
  .plate .v { color: var(--ink); }
  .plate .v .adj { color: var(--accent-deep); }

  .colours { display: flex; flex-wrap: wrap; gap: 6px; }
  .colours .chip {
    font-family: var(--font-mono); font-size: 0.7rem; padding: 4px 10px;
    border: 1px solid var(--line-2); border-radius: 999px; color: var(--ink-soft);
  }

  .door-foot { margin-top: auto; }
  .ask {
    display: inline-flex; align-items: center; gap: 8px; width: 100%;
    justify-content: center; font-family: var(--font-body); font-weight: 600;
    font-size: 0.94rem; padding: 12px 16px; border-radius: 9px; text-decoration: none;
    background: var(--accent); color: var(--on-accent); border: 1px solid var(--accent);
    transition: background .2s var(--ease), transform .12s var(--ease);
  }
  .ask .arrow { transition: transform .25s var(--ease); }
  .ask:hover { background: var(--accent-deep); }
  .ask:hover .arrow { transform: translateX(4px); }
  .ask:active { transform: translateY(1px); }
  .ask.disabled { background: transparent; color: var(--ink-soft); border-color: var(--line-2); pointer-events: none; }

  /* ---------- Footer ---------- */
  footer.site { border-top: 1px solid var(--bg-line); padding: 46px 0 70px; }
  .foot-inner { display: flex; flex-wrap: wrap; justify-content: space-between; gap: 22px; align-items: baseline; }
  .foot-inner .brand { font-size: 1.15rem; }
  .foot-contact { font-family: var(--font-mono); font-size: 0.82rem; color: var(--on-bg-soft); line-height: 1.95; }
  .foot-contact a:hover { color: var(--emph); }
  .foot-note { font-family: var(--font-mono); font-size: 0.72rem; color: var(--on-bg-soft); margin-top: 24px; max-width: 46ch; opacity: 0.85; }

  :focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; border-radius: 4px; }

  @media (max-width: 560px) {
    .site-contact { display: none; }
    .grid { grid-template-columns: 1fr; }
    .plate .row { grid-template-columns: 82px 1fr; }
    .switch button { padding: 6px 10px; }
  }
  @media (prefers-reduced-motion: reduce) {
    .door { opacity: 1; transform: none; transition: none; }
    html { scroll-behavior: auto; }
    .ask:hover .arrow { transform: none; }
  }
</style>
</head>
<body>

<div class="switch" role="group" aria-label="Preview theme">
  <button data-theme="foundry" aria-pressed="true">Foundry</button>
  <button data-theme="oxblood" aria-pressed="false">Oxblood</button>
  <button data-theme="workshop" aria-pressed="false">Workshop</button>
</div>

<header class="site">
  <div class="site-bar">
    <a class="brand" href="#top"><span class="re">Re</span>Door</a>
    <a class="site-contact" href="#">Get in touch →</a>
  </div>
</header>

<main id="top">
  <section class="hero wrap">
    <p class="kicker">Reclaimed &amp; restored · one-offs</p>
    <h1>Garage doors, <em>given a second life.</em></h1>
    <p class="lede" id="heroLede"></p>
    <div class="meta" id="heroMeta"></div>
  </section>

  <div class="controls">
    <div class="wrap controls-inner" id="filters" role="group" aria-label="Filter doors">
      <button class="filter" data-filter="available" aria-pressed="true">Available <span class="n" id="cAvail"></span></button>
      <button class="filter" data-filter="all" aria-pressed="false">All <span class="n" id="cAll"></span></button>
      <button class="filter" data-filter="sold" aria-pressed="false">Sold <span class="n" id="cSold"></span></button>
    </div>
  </div>

  <div class="wrap"><div class="grid" id="grid"></div></div>
</main>

<footer class="site">
  <div class="wrap foot-inner">
    <div>
      <a class="brand" href="#top"><span class="re">Re</span>Door</a>
      <p class="foot-note">Every door is one-off, reclaimed stock. Sizes are approximate — measure your opening before buying.</p>
    </div>
    <div class="foot-contact" id="footContact"></div>
  </div>
</footer>

<script>
/* Mockup data — mirrors doors.js so this file renders standalone. */
var REDOOR = {
  config: {
    blurb: "Salvaged from old houses and given a full service — cleaned, repaired, and repainted to order. Every door is a one-off. Have a look, then get in touch.",
    contactEmail: "adammhannigan@gmail.com",
    area: "Collection / local delivery",
    lastUpdated: "2026-07-03"
  },
  doors: [
    { id:"d-20260702-timber-oak", title:"Timber up-and-over, oak panel", type:"Up-and-over", price:185, priceNote:"ono",
      condition:"Fully serviced — very good", age:"1990s", size:"2134 × 1980 mm", sizeAdjustable:true, sizeNote:"trims to fit",
      colourOptions:["Natural oak","White","Anthracite grey","Any RAL to order"],
      description:"Solid timber up-and-over saved from a 1990s house before demolition. Springs and pivots serviced, glides smoothly, grain sanded back ready to finish.",
      photos:[], status:"available", dateAdded:"2026-07-02" },
    { id:"d-20260628-steel-white", title:"Steel up-and-over, horizontal rib", type:"Up-and-over", price:120, priceNote:"",
      condition:"Serviced — good, light wear", age:"2000s", size:"2286 × 2134 mm", sizeAdjustable:false, sizeNote:"",
      colourOptions:["Current white","Repaint to any RAL"],
      description:"Galvanised steel ribbed door, structurally sound with only light surface marks. Mechanism cleaned and re-greased. A sturdy, low-cost option.",
      photos:[], status:"available", dateAdded:"2026-06-28" },
    { id:"d-20260615-timber-blue", title:"Timber side-hinged pair, coastal blue", type:"Side-hinged (double)", price:240, priceNote:"",
      condition:"Restored & repainted", age:"1970s", size:"2134 × 2134 mm", sizeAdjustable:true, sizeNote:"height reducible",
      colourOptions:["Coastal blue","Recolour to order"],
      description:"Character pair of side-hinged timber doors from a 1970s bungalow. Stripped, repaired, and repainted in a soft coastal blue. Ironmongery rehung true.",
      photos:[], status:"sold", dateAdded:"2026-06-15" }
  ]
};

(function () {
  var cfg = REDOOR.config, doors = REDOOR.doors.slice();

  function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;"); }
  function money(n){ return (n==null||n==="")?"":(typeof n==="number"?"£"+n.toLocaleString("en-GB"):esc(n)); }
  function mailto(d){
    var subj="ReDoor enquiry: "+(d?d.title:"");
    var body=d?("Hi,\n\nI'm interested in this door:\n\n"+d.title+" — "+money(d.price)+"\n(ref "+d.id+")\n\nIs it still available?\n\nThanks"):"Hi, I'd like to ask about a door.";
    return "mailto:"+encodeURIComponent(cfg.contactEmail)+"?subject="+encodeURIComponent(subj)+"&body="+encodeURIComponent(body);
  }

  /* Archival plate: a drawn door that varies by type, so a photo-less card
     reads as an intentional catalogue plate rather than a missing image. */
  function plate(d){
    var t=(d.type||"").toLowerCase(), lines="";
    if (t.indexOf("side-hinged")>-1){
      lines =
        '<rect x="70" y="34" width="72" height="132" rx="2"/><rect x="158" y="34" width="72" height="132" rx="2"/>'+
        '<line x1="86" y1="34" x2="86" y2="166"/><line x1="106" y1="34" x2="106" y2="166"/><line x1="126" y1="34" x2="126" y2="166"/>'+
        '<line x1="174" y1="34" x2="174" y2="166"/><line x1="194" y1="34" x2="194" y2="166"/><line x1="214" y1="34" x2="214" y2="166"/>'+
        '<circle cx="150" cy="102" r="3"/>';
    } else if (t.indexOf("rib")>-1 || d.id.indexOf("steel")>-1){
      lines='<rect x="70" y="34" width="160" height="132" rx="2"/>';
      for(var y=48;y<=152;y+=13){ lines+='<line x1="70" y1="'+y+'" x2="230" y2="'+y+'"/>'; }
    } else {
      lines='<rect x="70" y="34" width="160" height="132" rx="2"/>';
      lines+='<line x1="70" y1="67" x2="230" y2="67"/><line x1="70" y1="100" x2="230" y2="100"/><line x1="70" y1="133" x2="230" y2="133"/>';
      lines+='<line x1="123" y1="34" x2="123" y2="166"/><line x1="177" y1="34" x2="177" y2="166"/>';
    }
    return '<svg class="plate-svg" viewBox="0 0 300 200" fill="none" aria-hidden="true" '+
           'stroke="var(--field-ink)" stroke-width="1.4" stroke-linecap="round">'+lines+'</svg>'+
           '<span class="plate-ref">Ref '+esc(d.id.replace("d-",""))+'</span>';
  }

  function specRow(k,v){ return v?('<div class="row"><div class="k">'+esc(k)+'</div><div class="v">'+v+'</div></div>'):""; }

  function card(d){
    var sizeVal=esc(d.size||"");
    if(d.sizeAdjustable) sizeVal+=' <span class="adj">· '+esc(d.sizeNote||"adjustable")+'</span>';
    var photo=(d.photos&&d.photos.length)
      ? '<img src="'+esc(d.photos[0])+'" alt="'+esc(d.title)+'" loading="lazy" />'
      : plate(d);
    var stamp = d.status==="sold" ? '<div class="stamp sold">SOLD</div>'
      : '<div class="stamp new">NEW IN</div>';
    var chips=(d.colourOptions||[]).map(function(c){return '<span class="chip">'+esc(c)+'</span>';}).join("");
    var cta = d.status==="sold"
      ? '<span class="ask disabled">Sold</span>'
      : '<a class="ask" href="'+mailto(d)+'">Ask about this door <span class="arrow">→</span></a>';
    return '<article class="door '+(d.status==="sold"?"sold":"")+'">'+
      '<div class="photo">'+photo+stamp+'</div>'+
      '<div class="door-body">'+
        '<div class="door-head"><h2 class="door-title">'+esc(d.title)+'</h2>'+
          '<div class="price">'+money(d.price)+(d.priceNote?'<span class="note">'+esc(d.priceNote)+'</span>':"")+'</div></div>'+
        (d.description?'<p class="desc">'+esc(d.description)+'</p>':"")+
        '<div class="plate">'+specRow("Type",esc(d.type))+specRow("Condition",esc(d.condition))+specRow("Age",esc(d.age))+specRow("Size",sizeVal)+'</div>'+
        (chips?'<div class="colours">'+chips+'</div>':"")+
        '<div class="door-foot">'+cta+'</div>'+
      '</div></article>';
  }

  var avail=doors.filter(function(d){return d.status!=="sold";});
  var sold=doors.filter(function(d){return d.status==="sold";});
  function byDate(a,b){return String(b.dateAdded||"").localeCompare(String(a.dateAdded||""));}
  var ordered=avail.slice().sort(byDate).concat(sold.slice().sort(byDate));

  document.getElementById("heroLede").textContent=cfg.blurb;
  var meta=['<span><span class="dot"></span><b>'+avail.length+'</b> available now</span>'];
  if(cfg.area) meta.push("<span>"+esc(cfg.area)+"</span>");
  if(cfg.lastUpdated) meta.push("<span>Updated "+esc(cfg.lastUpdated)+"</span>");
  document.getElementById("heroMeta").innerHTML=meta.join("");
  document.getElementById("footContact").innerHTML=
    '<a href="'+mailto(null)+'">'+esc(cfg.contactEmail)+'</a><br>'+esc(cfg.area);
  document.getElementById("cAvail").textContent=avail.length;
  document.getElementById("cAll").textContent=doors.length;
  document.getElementById("cSold").textContent=sold.length;

  var grid=document.getElementById("grid");
  var io=("IntersectionObserver" in window)?new IntersectionObserver(function(es){
    es.forEach(function(e){ if(e.isIntersecting){ e.target.classList.add("in"); io.unobserve(e.target);} });
  },{rootMargin:"0px 0px -40px 0px"}):null;

  function render(filter){
    var list=filter==="all"?ordered:filter==="sold"?sold.slice().sort(byDate):avail.slice().sort(byDate);
    grid.innerHTML=list.map(card).join("");
    var cards=grid.querySelectorAll(".door");
    for(var i=0;i<cards.length;i++){ cards[i].style.transitionDelay=Math.min(i*55,320)+"ms"; if(io)io.observe(cards[i]); else cards[i].classList.add("in"); }
  }
  var fb=document.querySelectorAll(".filter");
  Array.prototype.forEach.call(fb,function(b){ b.addEventListener("click",function(){
    Array.prototype.forEach.call(fb,function(x){x.setAttribute("aria-pressed","false");});
    b.setAttribute("aria-pressed","true"); render(b.getAttribute("data-filter"));
  });});
  render("available");

  /* theme switcher */
  var root=document.documentElement;
  var tb=document.querySelectorAll(".switch button");
  Array.prototype.forEach.call(tb,function(b){ b.addEventListener("click",function(){
    root.setAttribute("data-theme",b.getAttribute("data-theme"));
    Array.prototype.forEach.call(tb,function(x){x.setAttribute("aria-pressed","false");});
    b.setAttribute("aria-pressed","true");
  });});
  root.setAttribute("data-theme","foundry");
})();
</script>
</body>
</html>
